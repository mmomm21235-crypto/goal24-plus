<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal 24 - المباريات</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22c55e;
      margin-bottom: 5px;
    }

    .live-bar {
      text-align: center;
      color: red;
      margin-bottom: 20px;
      font-size: 14px;
      animation: blink 1s infinite;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .container {
      max-width: 850px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .live-card {
      border: 2px solid red;
    }

    .live {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    .league {
      color: #facc15;
      font-size: 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 15px 0;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40%;
      text-align: center;
    }

    .logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: white;
      padding: 4px;
      margin-bottom: 8px;
      object-fit: contain;
    }

    .team-name {
      font-size: 17px;
      font-weight: bold;
    }

    .vs {
      color: #22c55e;
      font-weight: bold;
      font-size: 20px;
    }

    .time {
      color: #38bdf8;
      font-size: 15px;
      text-align: center;
      margin-top: 10px;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      color: #22c55e;
      font-size: 14px;
    }

    @keyframes blink {
      50% {
        opacity: 0.5;
      }
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: 13px;
    }

    @media(max-width:600px){

      .team-name{
        font-size:14px;
      }

      .logo{
        width:45px;
        height:45px;
      }

    }

  </style>
</head>

<body>

<h1>⚽ Goal 24</h1>

<p class="live-bar">
🔴 تحديث مباشر كل 10 ثواني
</p>

<input id="search" placeholder="ابحث عن فريق..." />

<select id="leagueFilter">
  <option value="all">كل الدوريات</option>
</select>

<div class="container" id="matches">
  جاري تحميل المباريات...
</div>

<div class="footer">
  Goal 24 © 2026
</div>

<script>

let allMatches = [];

async function getTeamLogo(teamName){

  try{

    const res = await fetch(
      `https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${teamName}`
    );

    const data = await res.json();

    return data.teams?.[0]?.strTeamBadge
      ||

    "https://www.thesportsdb.com/images/media/team/badge/default.png";

  }catch{

    return "https://www.thesportsdb.com/images/media/team/badge/default.png";

  }

}

async function loadMatches() {

  try {

    const today =
      new Date().toISOString().slice(0,10);

    const res = await fetch(
      `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`
    );

    const data = await res.json();

    allMatches = data.events || [];

    for(let m of allMatches){

      m.homeLogo =
        await getTeamLogo(m.strHomeTeam);

      m.awayLogo =
        await getTeamLogo(m.strAwayTeam);

    }

    setupFilters();

    render(allMatches);

  } catch (e) {

    document.getElementById("matches").innerHTML =
      "❌ حدث خطأ أثناء تحميل المباريات";

  }

}

function setupFilters() {

  const leagues =
    [...new Set(allMatches.map(m => m.strLeague))];

  const select =
    document.getElementById("leagueFilter");

  select.innerHTML =
    '<option value="all">كل الدوريات</option>';

  leagues.forEach(l => {

    let opt =
      document.createElement("option");

    opt.value = l;

    opt.textContent = l;

    select.appendChild(opt);

  });

  select.onchange = filterMatches;

  document.getElementById("search").oninput =
    filterMatches;

}

function filterMatches() {

  let searchValue =
    document.getElementById("search")
    .value
    .toLowerCase();

  let leagueValue =
    document.getElementById("leagueFilter")
    .value;

  let filtered = allMatches.filter(m => {

    let leagueMatch =
      leagueValue === "all" ||
      m.strLeague === leagueValue;

    let searchMatch =

      (m.strHomeTeam || "")
      .toLowerCase()
      .includes(searchValue)

      ||

      (m.strAwayTeam || "")
      .toLowerCase()
      .includes(searchValue);

    return leagueMatch && searchMatch;

  });

  render(filtered);

}

function openMatch(id) {

  window.location.href =
    "match.html?id=" + id;

}

function isLive() {

  return new Date().getMinutes() % 2 === 0;

}

function render(matches) {

  if (!matches.length) {

    document.getElementById("matches").innerHTML =
      "لا توجد مباريات";

    return;

  }

  document.getElementById("matches").innerHTML =

    matches.map(m => {

      let live = isLive();

      return `

        <div class="card ${live ? 'live-card' : ''}"

          onclick="openMatch('${m.idEvent}')">

          ${live
            ? `<div class="live">🔴 LIVE</div>`
            : ""
          }

          <div class="league">
            🏆 ${m.strLeague}
          </div>

          <div class="teams">

            <div class="team">

              <img
                class="logo"
                src="${m.homeLogo}"
              >

              <div class="team-name">
                ${m.strHomeTeam}
              </div>

            </div>

            <div class="vs">
              VS
            </div>

            <div class="team">

              <img
                class="logo"
                src="${m.awayLogo}"
              >

              <div class="team-name">
                ${m.strAwayTeam}
              </div>

            </div>

          </div>

          <div class="time">
            ⏰ ${m.strTime || "غير محدد"}
          </div>

          <div class="status">
            ${live ? "🔥 المباراة جارية الآن" : "⌛ لم تبدأ بعد"}
          </div>

        </div>

      `;

    }).join("");

}

loadMatches();

setInterval(loadMatches, 10000);

</script>

</body>
</html>
