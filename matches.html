<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOAL24+ | المباريات</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#020617;
  color:white;
  padding:15px;
}

h1{
  text-align:center;
  color:#ff2020;
  margin-bottom:10px;
  font-size:32px;
}

.live-bar{
  text-align:center;
  color:#ff3b3b;
  margin-bottom:20px;
  animation:blink 1s infinite;
  font-size:14px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-bottom:10px;
  background:#111827;
  color:white;
  font-size:15px;
}

.container{
  max-width:850px;
  margin:auto;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:10px;
  margin-bottom:14px;
  position:relative;
  transition:.3s;
  border:1px solid rgba(255,255,255,.08);
}

.card:hover{
  transform:translateY(-2px);
}

.live-card{
  border:1px solid red;
  box-shadow:0 0 15px rgba(255,0,0,.25);
}

.live{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:bold;
  animation:blink 1s infinite;
}

.league{
  text-align:center;
  color:#facc15;
  font-size:13px;
  margin-bottom:12px;
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.team{
  width:40%;
  text-align:center;
}

.logo{
  width:42px;
  height:42px;
  object-fit:contain;
  background:white;
  border-radius:50%;
  padding:3px;
  margin-bottom:8px;
}

.team-name{
  font-size:14px;
  font-weight:bold;
  line-height:1.4;
}

.vs{
  color:#22c55e;
  font-weight:bold;
  font-size:18px;
}

.time{
  text-align:center;
  color:#38bdf8;
  margin-top:10px;
  font-size:13px;
}

.status{
  text-align:center;
  margin-top:8px;
  font-size:13px;
  color:#94a3b8;
}

.live-status{
  color:#ff3b3b;
}

.footer{
  text-align:center;
  margin-top:25px;
  color:#64748b;
  font-size:12px;
}

.loading{
  text-align:center;
  padding:30px;
  color:#94a3b8;
}

@keyframes blink{
  50%{
    opacity:.5;
  }
}

@media(max-width:600px){

  h1{
    font-size:28px;
  }

  .team-name{
    font-size:13px;
  }

  .logo{
    width:38px;
    height:38px;
  }

}

</style>
</head>

<body>

<h1>⚽ GOAL24+</h1>

<div class="live-bar">
🔴 تحديث مباشر كل 10 ثواني
</div>

<input id="search" placeholder="ابحث عن فريق...">

<select id="leagueFilter">
<option value="all">كل الدوريات</option>
</select>

<div class="container" id="matches">

<div class="loading">
جاري تحميل المباريات...
</div>

</div>

<div class="footer">
GOAL24+ © 2026
</div>

<script>

let allMatches = [];

const defaultLogo =
"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Image-not-found.png/480px-Image-not-found.png";

async function getTeamLogo(team){

  try{

    const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${team}`
    );

    const data = await res.json();

    return data?.teams?.[0]?.strTeamBadge || defaultLogo;

  }catch{

    return defaultLogo;

  }

}

async function loadMatches(){

  try{

    const today =
    new Date().toISOString().slice(0,10);

    const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`
    );

    const data = await res.json();

    allMatches = data.events || [];

    for(const m of allMatches){

      m.homeLogo =
      await getTeamLogo(m.strHomeTeam);

      m.awayLogo =
      await getTeamLogo(m.strAwayTeam);

    }

    setupFilters();

    render(allMatches);

  }catch{

    document.getElementById("matches").innerHTML =
    `<div class="loading">❌ حدث خطأ أثناء التحميل</div>`;

  }

}

function setupFilters(){

  const leagues =
  [...new Set(allMatches.map(m => m.strLeague))];

  const select =
  document.getElementById("leagueFilter");

  select.innerHTML =
  `<option value="all">كل الدوريات</option>`;

  leagues.forEach(l=>{

    let option =
    document.createElement("option");

    option.value = l;

    option.textContent = l;

    select.appendChild(option);

  });

  select.onchange = filterMatches;

  document.getElementById("search").oninput =
  filterMatches;

}

function filterMatches(){

  const search =
  document.getElementById("search")
  .value
  .toLowerCase();

  const league =
  document.getElementById("leagueFilter")
  .value;

  const filtered = allMatches.filter(m=>{

    const leagueMatch =
    league === "all" ||
    m.strLeague === league;

    const searchMatch =

    (m.strHomeTeam || "")
    .toLowerCase()
    .includes(search)

    ||

    (m.strAwayTeam || "")
    .toLowerCase()
    .includes(search);

    return leagueMatch && searchMatch;

  });

  render(filtered);

}

function openMatch(id){

  window.location.href =
  "match.html?id=" + id;

}

function isLive(){

  return new Date().getMinutes() % 2 === 0;

}

function render(matches){

  if(!matches.length){

    document.getElementById("matches").innerHTML =
    `<div class="loading">لا توجد مباريات</div>`;

    return;

  }

  document.getElementById("matches").innerHTML =

  matches.map(m=>{

    const live = isLive();

    return `

    <div
      class="card ${live ? 'live-card' : ''}"
      onclick="openMatch('${m.idEvent}')"
    >

      ${live
      ? `<div class="live">LIVE</div>`
      : ``}

      <div class="league">
      🏆 ${m.strLeague}
      </div>

      <div class="teams">

        <div class="team">

          <img
          class="logo"
          src="${m.homeLogo}"
          onerror="this.src='${defaultLogo}'"
          >

          <div class="team-name">
          ${m.strHomeTeam}
          </div>

        </div>

        <div class="vs">
        VS
        </div>

        <div class="team">

          <img
          class="logo"
          src="${m.awayLogo}"
          onerror="this.src='${defaultLogo}'"
          >

          <div class="team-name">
          ${m.strAwayTeam}
          </div>

        </div>

      </div>

      <div class="time">
      ⏰ ${m.strTime || "غير محدد"}
      </div>

      <div class="status ${live ? 'live-status' : ''}">
      ${live
      ? "🔥 المباراة جارية الآن"
      : "⌛ لم تبدأ بعد"}
      </div>

    </div>

    `;

  }).join("");

}

loadMatches();

setInterval(loadMatches,10000);

</script>

</body>
</html>
