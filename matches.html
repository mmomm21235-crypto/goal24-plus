<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOAL24+ | المباريات</title>

<meta name="description" content="تابع مباريات اليوم ونتائج كرة القدم مباشرة على GOAL24+">
<meta name="keywords" content="مباريات اليوم, نتائج مباشرة, كرة القدم">
<meta name="robots" content="index, follow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

.matches-page{
padding:120px 15px 40px;
min-height:100vh;
background:#020617;
}

.matches-title{
text-align:center;
font-size:2.2rem;
margin-bottom:10px;
color:#ff2020;
font-weight:800;
}

.live-bar{
text-align:center;
color:#ff3b3b;
margin-bottom:20px;
animation:pulse 1s infinite;
font-size:14px;
}

.filters{
max-width:850px;
margin:auto auto 15px;
}

.filters input,
.filters select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-bottom:10px;
background:#111827;
color:white;
font-family:'Tajawal',sans-serif;
font-size:15px;
outline:none;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tabs button{
flex:1;
padding:13px;
border:none;
border-radius:14px;
background:#111827;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
font-family:'Tajawal',sans-serif;
}

.tabs button.active{
background:var(--main);
}

.tabs button:hover{
background:#1e293b;
}

.matches-container{
max-width:850px;
margin:auto;
}

.match-card{
background:#111827;
border-radius:22px;
padding:18px;
margin-bottom:15px;
position:relative;
border:1px solid rgba(255,255,255,.08);
transition:.3s;
cursor:pointer;
}

.match-card:hover{
transform:translateY(-4px);
border-color:var(--main);
}

.live-card{
border-color:red;
box-shadow:0 0 20px rgba(255,0,0,.2);
}

.live-badge{
position:absolute;
top:12px;
right:12px;
background:red;
padding:5px 12px;
border-radius:30px;
font-size:11px;
font-weight:700;
animation:pulse 1s infinite;
}

.league-name{
text-align:center;
margin-bottom:16px;
color:#facc15;
font-size:14px;
}

.match-teams{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.team{
width:40%;
text-align:center;
}

.team img{
width:50px;
height:50px;
object-fit:contain;
background:white;
border-radius:50%;
padding:4px;
margin:auto auto 10px;
}

.team-name{
font-size:15px;
font-weight:700;
line-height:1.5;
}

.vs{
font-size:22px;
font-weight:800;
color:#22c55e;
}

.match-time{
text-align:center;
margin-top:15px;
color:#38bdf8;
font-size:14px;
}

.match-status{
text-align:center;
margin-top:8px;
font-size:13px;
color:#cbd5e1;
}

.loading{
text-align:center;
padding:30px;
color:#94a3b8;
}

@media(max-width:600px){

.matches-title{
font-size:1.8rem;
}

.team-name{
font-size:13px;
}

.team img{
width:42px;
height:42px;
}

}

</style>

</head>

<body>

<nav>

<div class="container nav-content">

<a href="index.html" class="logo">
GOAL24<span>+</span>
</a>

<ul class="nav-links">

<li><a href="index.html">الرئيسية</a></li>
<li><a href="matches.html">المباريات</a></li>

</ul>

</div>

</nav>

<section class="matches-page">

<h1 class="matches-title">
⚽ مباريات اليوم
</h1>

<div class="live-bar">
🔴 تحديث مباشر كل 10 ثواني
</div>

<div class="filters">

<input
id="search"
type="text"
placeholder="ابحث عن فريق..."
>

<select id="leagueFilter">

<option value="all">
كل الدوريات
</option>

</select>

<div class="tabs">

<button onclick="changeDay(-1,this)">
أمس
</button>

<button class="active" onclick="changeDay(0,this)">
اليوم
</button>

<button onclick="changeDay(1,this)">
غدًا
</button>

</div>

</div>

<div class="matches-container" id="matches">

<div class="loading">
جاري تحميل المباريات...
</div>

</div>

</section>

<script>

let allMatches = [];
let currentDay = 0;

const defaultLogo =
"https://cdn-icons-png.flaticon.com/512/53/53283.png";

async function getTeamLogo(team){

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${team}`
);

const data = await res.json();

return data?.teams?.[0]?.strTeamBadge || defaultLogo;

}catch{

return defaultLogo;

}

}

async function loadMatches(){

const container =
document.getElementById("matches");

container.innerHTML =
`<div class="loading">جاري تحميل المباريات...</div>`;

try{

const date = new Date();

date.setDate(
date.getDate() + currentDay
);

const today =
date.toISOString().slice(0,10);

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`
);

const data = await res.json();

allMatches = data.events || [];

for(const match of allMatches){

match.homeLogo =
await getTeamLogo(match.strHomeTeam);

match.awayLogo =
await getTeamLogo(match.strAwayTeam);

}

setupFilters();

renderMatches(allMatches);

}catch{

container.innerHTML =
`<div class="loading">❌ فشل تحميل المباريات</div>`;

}

}

function setupFilters(){

const leagues =
[...new Set(allMatches.map(m => m.strLeague))];

const select =
document.getElementById("leagueFilter");

select.innerHTML =
`<option value="all">كل الدوريات</option>`;

leagues.forEach(league=>{

const option =
document.createElement("option");

option.value = league;

option.textContent = league;

select.appendChild(option);

});

select.onchange = filterMatches;

document.getElementById("search")
.oninput = filterMatches;

}

function filterMatches(){

const search =
document.getElementById("search")
.value
.toLowerCase();

const league =
document.getElementById("leagueFilter")
.value;

const filtered =
allMatches.filter(match=>{

const leagueMatch =
league === "all" ||
match.strLeague === league;

const searchMatch =

(match.strHomeTeam || "")
.toLowerCase()
.includes(search)

||

(match.strAwayTeam || "")
.toLowerCase()
.includes(search);

return leagueMatch && searchMatch;

});

renderMatches(filtered);

}

function openMatch(id){

window.location.href =
`match.html?id=${id}`;

}

function renderMatches(matches){

const container =
document.getElementById("matches");

if(!matches.length){

container.innerHTML =
`<div class="loading">لا توجد مباريات</div>`;

return;

}

container.innerHTML = matches.map(match=>{

const live =
match.strStatus === "Live";

return `

<div
class="match-card ${live ? 'live-card' : ''}"
onclick="openMatch('${match.idEvent}')"
>

${live
? `<div class="live-badge">LIVE</div>`
: ``}

<div class="league-name">
🏆 ${match.strLeague}
</div>

<div class="match-teams">

<div class="team">

<img
src="${match.homeLogo}"
onerror="this.src='${defaultLogo}'"
>

<div class="team-name">
${match.strHomeTeam}
</div>

</div>

<div class="vs">
VS
</div>

<div class="team">

<img
src="${match.awayLogo}"
onerror="this.src='${defaultLogo}'"
>

<div class="team-name">
${match.strAwayTeam}
</div>

</div>

</div>

<div class="match-time">
⏰ ${match.strTime || "غير محدد"}
</div>

<div class="match-status">

${live
? "🔥 المباراة جارية الآن"
: "⌛ لم تبدأ بعد"}

</div>

</div>

`;

}).join("");

}

function changeDay(day,button){

currentDay = day;

document
.querySelectorAll(".tabs button")
.forEach(btn => btn.classList.remove("active"));

button.classList.add("active");

loadMatches();

}

loadMatches();

setInterval(loadMatches,10000);

</script>

</body>
</html>
