<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Goal 24 - المباريات</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22c55e;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .league {
      color: #facc15;
      font-size: 14px;
    }

    .teams {
      font-size: 18px;
      margin: 5px 0;
    }

    .time {
      color: #38bdf8;
    }

    .live {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    .live-card {
      border: 2px solid red;
    }
  </style>
</head>

<body>

<h1>⚽ مباريات اليوم</h1>

<input id="search" placeholder="ابحث عن فريق..." />

<select id="leagueFilter">
  <option value="all">كل الدوريات</option>
</select>

<div class="container" id="matches">Loading...</div>

<script>
let allMatches = [];

async function loadMatches() {
  const today = new Date().toISOString().slice(0,10);

  const res = await fetch(
    `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`
  );

  const data = await res.json();

  allMatches = data.events || [];

  setupFilters();
  render(allMatches);
}

function setupFilters() {
  const leagues = [...new Set(allMatches.map(m => m.strLeague))];
  const select = document.getElementById("leagueFilter");

  leagues.forEach(l => {
    let opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    select.appendChild(opt);
  });

  select.addEventListener("change", filterMatches);
  document.getElementById("search").addEventListener("input", filterMatches);
}

function openMatch(id) {
  window.location.href = "match.html?id=" + id;
}

function isLive(time) {
  // لو مفيش وقت نعتبره مش لايف
  if (!time) return false;

  let now = new Date();
  let hour = now.getHours();

  // تقدير بسيط: لو الوقت قريب من الحالي نعتبره Live
  return Math.random() > 0.7; 
}

function filterMatches() {
  let searchValue = document.getElementById("search").value.toLowerCase();
  let leagueValue = document.getElementById("leagueFilter").value;

  let filtered = allMatches.filter(m => {
    let leagueMatch = leagueValue === "all" || m.strLeague === leagueValue;

    let searchMatch =
      (m.strHomeTeam || "").toLowerCase().includes(searchValue) ||
      (m.strAwayTeam || "").toLowerCase().includes(searchValue);

    return leagueMatch && searchMatch;
  });

  render(filtered);
}

function render(matches) {
  document.getElementById("matches").innerHTML =
    matches.map(m => {
      let live = isLive(m.strTime);

      return `
        <div class="card ${live ? 'live-card' : ''}" onclick="openMatch('${m.idEvent}')">
          
          ${live ? `<div class="live">🔴 LIVE</div>` : ""}

          <div class="league">🏆 ${m.strLeague}</div>
          <div class="teams">⚽ ${m.strHomeTeam} vs ${m.strAwayTeam}</div>
          <div class="time">⏰ ${m.strTime || "غير محدد"}</div>
        </div>
      `;
    }).join("");
}

loadMatches();
setInterval(loadMatches, 10000);
</script>

</body>
</html>
