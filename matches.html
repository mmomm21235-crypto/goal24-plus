<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Goal 24 - المباريات</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22c55e;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .league {
      color: #facc15;
      font-size: 14px;
    }

    .teams {
      font-size: 18px;
      margin: 5px 0;
    }

    .time {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h1>⚽ مباريات اليوم</h1>
<input id="search" placeholder="ابحث عن فريق..." />

<select id="leagueFilter">
  <option value="all">كل الدوريات</option>
</select> 
<div class="container" id="matches">Loading...</div>

<<script>
let allMatches = [];

async function loadMatches() {
  const today = new Date().toISOString().slice(0,10);

  const res = await fetch(
    `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`
  );

  const data = await res.json();

  allMatches = data.events || [];

  setupFilters();
  render(allMatches);
}

function setupFilters() {
  const leagues = [...new Set(allMatches.map(m => m.strLeague))];
  const select = document.getElementById("leagueFilter");

  leagues.forEach(l => {
    let opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    select.appendChild(opt);
  });

  select.addEventListener("change", filterMatches);
  document.getElementById("search").addEventListener("input", filterMatches);
}

function filterMatches() {
  let searchValue = document.getElementById("search").value.toLowerCase();
  let leagueValue = document.getElementById("leagueFilter").value;

  let filtered = allMatches.filter(m => {
    let leagueMatch = leagueValue === "all" || m.strLeague === leagueValue;

    let searchMatch =
      m.strHomeTeam.toLowerCase().includes(searchValue) ||
      m.strAwayTeam.toLowerCase().includes(searchValue);

    return leagueMatch && searchMatch;
  });

  render(filtered);
}

function render(matches) {
  document.getElementById("matches").innerHTML =
    matches.map(m => `
      <div style="padding:10px;border:1px solid #ddd;margin:5px">
        <b>${m.strLeague}</b><br>
        ⚽ ${m.strHomeTeam} vs ${m.strAwayTeam}<br>
        ⏰ ${m.strTime || "غير محدد"}
      </div>
    `).join("");
}

loadMatches();
</script>

</body>
</html>
