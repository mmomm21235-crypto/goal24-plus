<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOAL24+ | تفاصيل المباراة</title>

<meta name="description" content="تفاصيل مباريات كرة القدم والنتائج المباشرة على GOAL24+">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

.match-page{
min-height:100vh;
padding:120px 15px 40px;
background:#020617;
}

.match-container{
max-width:850px;
margin:auto;
background:#111827;
padding:30px;
border-radius:30px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 30px rgba(0,0,0,.3);
}

.match-title{
text-align:center;
font-size:2rem;
margin-bottom:30px;
color:var(--main);
font-weight:800;
}

.league{
text-align:center;
color:#facc15;
margin-bottom:30px;
font-size:1rem;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:35px;
}

.team{
width:40%;
text-align:center;
}

.team img{
width:90px;
height:90px;
object-fit:contain;
background:white;
padding:8px;
border-radius:50%;
margin-bottom:15px;
}

.team-name{
font-size:1.4rem;
font-weight:700;
line-height:1.5;
}

.vs{
font-size:2rem;
font-weight:800;
color:#22c55e;
}

.match-info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.info-card{
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,.05);
}

.info-title{
color:#94a3b8;
margin-bottom:10px;
font-size:.95rem;
}

.info-value{
font-size:1.1rem;
font-weight:700;
color:white;
}

.live-box{
margin-top:30px;
text-align:center;
padding:15px;
border-radius:20px;
background:rgba(255,0,0,.12);
border:1px solid rgba(255,0,0,.3);
color:#ff4d4d;
font-weight:700;
animation:pulse 1s infinite;
}

.loading{
text-align:center;
padding:50px;
font-size:1.1rem;
color:#94a3b8;
}

.error{
text-align:center;
padding:40px;
color:#ff4d4d;
font-size:1.1rem;
}

@media(max-width:700px){

.teams{
flex-direction:column;
}

.team{
width:100%;
}

.vs{
font-size:1.5rem;
}

.team-name{
font-size:1.2rem;
}

}

</style>

</head>

<body>

<nav>

<div class="container nav-content">

<a href="index.html" class="logo">
GOAL24<span>+</span>
</a>

<ul class="nav-links">

<li><a href="index.html">الرئيسية</a></li>
<li><a href="matches.html">المباريات</a></li>

</ul>

</div>

</nav>

<section class="match-page">

<div class="match-container">

<h1 class="match-title">
⚽ تفاصيل المباراة
</h1>

<div id="content" class="loading">
جاري تحميل بيانات المباراة...
</div>

</div>

</section>

<script>

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

const defaultLogo =
"https://cdn-icons-png.flaticon.com/512/53/53283.png";

async function getTeamLogo(team){

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${team}`
);

const data = await res.json();

return data?.teams?.[0]?.strTeamBadge || defaultLogo;

}catch{

return defaultLogo;

}

}

async function loadMatch(){

const content =
document.getElementById("content");

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/3/lookupevent.php?id=${id}`
);

const data = await res.json();

const match =
data.events[0];

if(!match){

content.innerHTML =
`<div class="error">❌ المباراة غير موجودة</div>`;

return;

}

const homeLogo =
await getTeamLogo(match.strHomeTeam);

const awayLogo =
await getTeamLogo(match.strAwayTeam);

const isLive =
match.strStatus === "Live";

content.classList.remove("loading");

content.innerHTML = `

<div class="league">
🏆 ${match.strLeague || "دوري غير معروف"}
</div>

<div class="teams">

<div class="team">

<img
src="${homeLogo}"
onerror="this.src='${defaultLogo}'"
alt="${match.strHomeTeam}"
>

<div class="team-name">
${match.strHomeTeam}
</div>

</div>

<div class="vs">
VS
</div>

<div class="team">

<img
src="${awayLogo}"
onerror="this.src='${defaultLogo}'"
alt="${match.strAwayTeam}"
>

<div class="team-name">
${match.strAwayTeam}
</div>

</div>

</div>

<div class="match-info">

<div class="info-card">

<div class="info-title">
📅 التاريخ
</div>

<div class="info-value">
${match.dateEvent || "غير معروف"}
</div>

</div>

<div class="info-card">

<div class="info-title">
⏰ التوقيت
</div>

<div class="info-value">
${match.strTime || "غير محدد"}
</div>

</div>

<div class="info-card">

<div class="info-title">
📍 الملعب
</div>

<div class="info-value">
${match.strVenue || "غير معروف"}
</div>

</div>

<div class="info-card">

<div class="info-title">
🏟️ الحالة
</div>

<div class="info-value">
${match.strStatus || "لم تبدأ"}
</div>

</div>

</div>

${isLive
? `
<div class="live-box">
🔴 المباراة جارية الآن
</div>
`
: ``}

`;

}catch{

content.innerHTML =
`<div class="error">❌ حدث خطأ أثناء تحميل المباراة</div>`;

}

}

loadMatch();

</script>

</body>
</html>
